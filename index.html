<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비버웍스 CS 상담 응대 가이드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Accordion Transition */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }

        .accordion-open .accordion-content {
            max-height: 1200px;
            padding-top: 12px;
            padding-bottom: 12px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HANGUL SEARCH UTILS ---
        const getChoseong = (str) => {
            const choseongList = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            let result = "";
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) result += choseongList[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        };

        const matchSearch = (target, query) => {
            if (!query) return true;
            const normalizedTarget = target.toLowerCase().replace(/\s/g, "");
            const normalizedQuery = query.toLowerCase().replace(/\s/g, "");
            if (normalizedTarget.includes(normalizedQuery)) return true;
            const choseongTarget = getChoseong(normalizedTarget);
            return choseongTarget.includes(normalizedQuery);
        };

        // --- GLOBAL COMPONENTS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Step = ({ title, description, children, icon, color = "blue", onBack }) => (
            <div className="flex flex-col items-center animate-fade-in text-center relative w-full">
                {onBack && (
                    <button onClick={onBack} className="absolute -top-12 left-0 flex items-center gap-1 text-slate-400 hover:text-blue-600 font-bold transition-colors group">
                        <Icon name="arrow-left" size={18} className="group-hover:-translate-x-1 transition-transform" />
                        <span>이전으로</span>
                    </button>
                )}
                <div className={`w-20 h-20 rounded-full bg-${color}-100 flex items-center justify-center mb-6 border-4 border-white shadow-xl`}>
                    <Icon name={icon} size={40} className={`text-${color}-600`} />
                </div>
                <h2 className="text-3xl font-black text-slate-900 mb-3 tracking-tight">{title}</h2>
                <p className="text-slate-500 mb-10 max-w-lg leading-relaxed whitespace-pre-line text-lg font-medium">{description}</p>
                <div className="grid grid-cols-1 gap-4 w-full max-w-md">
                    {children}
                </div>
            </div>
        );

        const ChoiceButton = ({ label, onClick, sublabel, icon, color = "blue", editMode, onEdit, onDelete }) => (
            <div className="relative group">
                <button
                    onClick={onClick}
                    className={`w-full group relative flex items-center p-6 bg-white border-2 border-slate-200 rounded-[2rem] hover:border-${color}-500 hover:shadow-2xl hover:shadow-${color}-100 transition-all duration-300 text-left overflow-hidden`}
                >
                    <div className="flex-grow">
                        <span className={`block font-bold text-xl text-slate-800 group-hover:text-${color}-600 mb-1`}>{label}</span>
                        {sublabel && <span className="text-sm text-slate-400 group-hover:text-slate-500">{sublabel}</span>}
                    </div>
                    {icon && <Icon name={icon} className={`text-slate-300 group-hover:text-${color}-500 transition-colors`} />}
                    <div className={`absolute bottom-0 left-0 h-1.5 w-0 bg-${color}-500 transition-all duration-300 group-hover:w-full`}></div>
                </button>
                {editMode && (
                    <div className="absolute top-2 right-2 flex gap-1 z-10">
                        <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="p-2 bg-slate-100 text-blue-600 rounded-full hover:bg-blue-100 transition-colors shadow-sm"><Icon name="pencil" size={14} /></button>
                        <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-2 bg-slate-100 text-rose-600 rounded-full hover:bg-rose-100 transition-colors shadow-sm"><Icon name="trash-2" size={14} /></button>
                    </div>
                )}
            </div>
        );

        // --- URL LINKIFY COMPONENT ---
        const Linkify = ({ text }) => {
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/g;
            const parts = text.split(urlRegex);
            return parts.map((part, i) => {
                if (part.match(urlRegex)) {
                    const href = part.startsWith('www.') ? `http://${part}` : part;
                    return (
                        <a key={i} href={href} target="_blank" rel="noopener noreferrer" className="text-blue-500 underline hover:text-blue-700 break-all" onClick={(e) => e.stopPropagation()}>
                            {part}
                        </a>
                    );
                }
                return part;
            });
        };

        const ResultCard = ({ stepKey, data, categories, newItem, setNewItem, addItem, removeItem, updateItem, moveOrCopyItem, onReset, onBack }) => {
            const [searchTerm, setSearchTerm] = useState("");
            const [expandedIdx, setExpandedIdx] = useState(null);
            const [editingIdx, setEditingIdx] = useState(null);
            const [editingText, setEditingText] = useState("");

            // 이동/복사 모달 상태
            const [actionModal, setActionModal] = useState({ isOpen: false, itemIndex: null, itemText: "" });
            const [selectedTarget, setSelectedTarget] = useState("");
            const [actionType, setActionType] = useState("copy"); // copy, move

            const openActionModal = (e, idx, text) => {
                e.stopPropagation();
                setActionModal({ isOpen: true, itemIndex: idx, itemText: text });
                setSelectedTarget("");
                setActionType("copy");
            };

            const handleActionSubmit = () => {
                if (!selectedTarget) {
                    alert("이동/복사할 대상 분류를 선택해주세요.");
                    return;
                }
                moveOrCopyItem(stepKey, selectedTarget, actionModal.itemIndex, actionType);
                setActionModal({ isOpen: false, itemIndex: null, itemText: "" });
            };

            const filteredList = useMemo(() => {
                return data.list.filter(item => matchSearch(item, searchTerm));
            }, [data.list, searchTerm]);

            const toggleAccordion = (idx) => {
                if (editingIdx !== null) return;
                setExpandedIdx(expandedIdx === idx ? null : idx);
            };

            const startEditing = (e, idx, text) => {
                e.stopPropagation();
                setEditingIdx(idx);
                setEditingText(text);
                setExpandedIdx(idx);
            };

            const saveEdit = (idx) => {
                updateItem(stepKey, idx, editingText);
                setEditingIdx(null);
            };

            const cancelEdit = () => {
                setEditingIdx(null);
                setEditingText("");
            };

            return (
                <div className={`w-full max-w-2xl p-8 rounded-[2.5rem] border-2 ${data.type === 'success' ? 'bg-emerald-50 border-emerald-100 shadow-emerald-50' : 'bg-rose-50 border-rose-100 shadow-rose-50'} shadow-2xl animate-fade-in`}>
                    <div className="flex flex-col gap-6 mb-8">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center">
                                <div className={`p-4 rounded-2xl ${data.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'} text-white mr-4 shadow-lg shadow-current/20`}>
                                    <Icon name={data.icon} size={32} />
                                </div>
                                <h3 className={`text-2xl font-black tracking-tight ${data.type === 'success' ? 'text-emerald-900' : 'text-rose-900'}`}>{data.title}</h3>
                            </div>
                        </div>

                        <div className="relative">
                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input
                                type="text"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                placeholder="대응 지침 검색 (초성 입력 가능: ㅂㅂ)"
                                className="w-full pl-12 pr-4 py-4 bg-white/80 backdrop-blur border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none font-bold text-slate-700 shadow-inner"
                            />
                        </div>
                    </div>

                    <div className="space-y-3 mb-8 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar text-left">
                        {filteredList.length > 0 ? filteredList.map((item, idx) => {
                            const originalIdx = data.list.indexOf(item);
                            const isEditing = editingIdx === originalIdx;

                            return (
                                <div
                                    key={originalIdx}
                                    className={`group bg-white rounded-2xl border transition-all ${expandedIdx === originalIdx ? 'border-blue-400 shadow-lg ring-1 ring-blue-100 accordion-open' : 'border-slate-200 hover:border-slate-300'}`}
                                >
                                    <div className="w-full flex items-center p-4 text-left cursor-pointer" onClick={() => toggleAccordion(originalIdx)}>
                                        <div className={`mr-3 flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center ${data.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                            <Icon name={expandedIdx === originalIdx ? "minus" : "plus"} size={14} />
                                        </div>
                                        <span className="flex-grow text-slate-700 font-bold text-lg truncate">
                                            {item.split('\n')[0]}
                                        </span>
                                        <Icon name="chevron-down" size={18} className={`text-slate-300 transition-transform ${expandedIdx === originalIdx ? 'rotate-180' : ''}`} />
                                    </div>

                                    <div className="accordion-content px-4 sm:px-12">
                                        <div className="border-t border-slate-50 pt-4">
                                            {isEditing ? (
                                                <div className="flex flex-col gap-3 mb-4">
                                                    <textarea
                                                        value={editingText}
                                                        onChange={(e) => setEditingText(e.target.value)}
                                                        className="w-full p-4 bg-slate-50 border-2 border-blue-200 rounded-xl focus:outline-none font-medium text-slate-700 min-h-[120px]"
                                                        autoFocus
                                                    />
                                                    <div className="flex justify-end gap-2">
                                                        <button
                                                            onClick={cancelEdit}
                                                            className="px-4 py-2 bg-slate-100 text-slate-500 rounded-lg font-bold hover:bg-slate-200 transition-all text-sm"
                                                        >
                                                            취소
                                                        </button>
                                                        <button
                                                            onClick={() => saveEdit(originalIdx)}
                                                            className="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-all text-sm"
                                                        >
                                                            저장하기
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <p className="text-slate-600 font-medium whitespace-pre-line pb-2 leading-relaxed">
                                                    <Linkify text={item} />
                                                </p>
                                            )}
                                        </div>
                                        {!isEditing && (
                                            <div className="flex justify-end gap-2 pb-4 flex-wrap mt-2">
                                                <button
                                                    onClick={(e) => openActionModal(e, originalIdx, item)}
                                                    className="flex items-center gap-1.5 px-3 py-1.5 text-indigo-500 hover:text-indigo-700 hover:bg-indigo-50 rounded-lg transition-all text-sm font-bold"
                                                >
                                                    <Icon name="folder-input" size={14} /> 이동/복사
                                                </button>
                                                <button
                                                    onClick={(e) => startEditing(e, originalIdx, item)}
                                                    className="flex items-center gap-1.5 px-3 py-1.5 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all text-sm font-bold"
                                                >
                                                    <Icon name="pencil" size={14} /> 수정하기
                                                </button>
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); removeItem(stepKey, originalIdx); }}
                                                    className="flex items-center gap-1.5 px-3 py-1.5 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-all text-sm font-bold"
                                                >
                                                    <Icon name="trash-2" size={14} /> 삭제하기
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        }) : (
                            <div className="py-20 text-center">
                                <Icon name="search-x" size={48} className="mx-auto text-slate-200 mb-4" />
                                <p className="text-slate-400 font-bold italic">검색 결과가 없습니다.</p>
                            </div>
                        )}
                    </div>

                    <div className="relative mb-8">
                        <input
                            type="text"
                            value={newItem}
                            onChange={(e) => setNewItem(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && addItem(stepKey)}
                            placeholder="새로운 대응 지침 추가..."
                            className="w-full p-4 pr-16 bg-white border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none font-bold text-slate-700 placeholder:text-slate-300 shadow-sm"
                        />
                        <button
                            onClick={() => addItem(stepKey)}
                            className="absolute right-2 top-2 bottom-2 px-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 transition-colors shadow-lg"
                        >
                            <Icon name="plus" size={20} />
                        </button>
                    </div>

                    <div className="flex gap-3 mt-4">
                        <button onClick={onBack} className="flex-1 flex items-center justify-center py-5 bg-white border-2 border-slate-200 text-slate-600 rounded-[1.5rem] font-black text-lg hover:bg-slate-50 transition-all active:scale-95">
                            <Icon name="arrow-left" size={20} className="mr-3" /> 이전으로
                        </button>
                        <button onClick={onReset} className="flex-[2] flex items-center justify-center py-5 bg-slate-900 text-white rounded-[1.5rem] font-black text-lg hover:bg-black transition-all shadow-xl active:scale-95">
                            <Icon name="rotate-ccw" size={20} className="mr-3" /> 처음으로
                        </button>
                    </div>

                    {/* 이동/복사 모달 */}
                    {actionModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl animate-fade-in text-left">
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                                    <Icon name="copy" className="text-blue-500" /> 지침 이동 및 복사
                                </h3>
                                <p className="text-sm text-slate-600 mb-6 truncate bg-slate-50 border border-slate-200 p-3 rounded-xl font-medium">
                                    {actionModal.itemText.split('\n')[0]}
                                </p>

                                <div className="flex gap-2 mb-6">
                                    <button
                                        onClick={() => setActionType('copy')}
                                        className={`flex-1 py-3 rounded-xl font-bold transition-all border-2 flex items-center justify-center gap-2 ${actionType === 'copy' ? 'bg-blue-50 border-blue-500 text-blue-600' : 'border-slate-200 text-slate-400 hover:border-slate-300'}`}
                                    >
                                        <Icon name="copy" size={18} /> 복사하기
                                    </button>
                                    <button
                                        onClick={() => setActionType('move')}
                                        className={`flex-1 py-3 rounded-xl font-bold transition-all border-2 flex items-center justify-center gap-2 ${actionType === 'move' ? 'bg-indigo-50 border-indigo-500 text-indigo-600' : 'border-slate-200 text-slate-400 hover:border-slate-300'}`}
                                    >
                                        <Icon name="folder-input" size={18} /> 이동하기
                                    </button>
                                </div>

                                <div className="mb-8">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">대상 분류 선택</label>
                                    <select
                                        value={selectedTarget}
                                        onChange={(e) => setSelectedTarget(e.target.value)}
                                        className="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none font-bold text-slate-700 bg-white"
                                    >
                                        <option value="" disabled>분류를 선택해주세요</option>
                                        {categories.filter(c => c.id !== stepKey).map(c => (
                                            <option key={c.id} value={c.id}>{c.title}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={() => setActionModal({ isOpen: false })} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-colors">취소</button>
                                    <button
                                        onClick={handleActionSubmit}
                                        className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-colors"
                                    >
                                        확인
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- INITIAL DATA ---
        const INITIAL_CONTENT = {
            res_error: { title: "기타 프로그램 오류 대응", icon: "alert-circle", type: "success", list: ["정확한 오류 메시지나 팝업 내용 확인\n어떤 화면에서 어떤 문구가 발생하는지 확인하세요.", "프로그램 강제 종료(Alt+F4) 및 재실행 안내\n재실행 후에도 동일한지 확인이 필요합니다.", "해결 안 될 시 원격 지원 도구 실행\n애니데스크(AnyDesk) 번호를 확인받으세요.", "로그인 오류 시 계정 정보 재확인\n비밀번호 대소문자 구분을 확인하세요."] },
            res_err_run: { title: "프로그램 실행/로딩 오류", icon: "power", type: "success", list: ["PC/포스기 재부팅 후 재실행 안내\n일시적인 메모리 부족일 수 있습니다.", "백신 프로그램 오작동 확인\n실시간 감지를 잠시 끄고 실행해보세요.", "관리자 권한으로 실행\n우클릭 > 관리자 권한으로 실행해보세요."] },
            res_err_pay: { title: "결제 중 통신/프로그램 오류", icon: "credit-card", type: "success", list: ["PG/밴사 통신 상태 확인\n인터넷 연결이 불안정할 때 발생할 수 있습니다.", "결제 모듈 업데이트 확인\n카드가 정상 결제됐는지 반드시 영수증을 확인하세요.", "임시로 현금 결제 유도 후 재접속\n고객 주문 처리가 시급할 때 안내하세요."] },
            res_hardware: { title: "장비/하드웨어 대응 (공통)", icon: "hard-drive", type: "success", list: ["전원 플러그 및 USB 케이블 연결 상태 확인\n간혹 발에 채여 빠지는 경우가 많습니다.", "프린터: 용지 잔량 및 걸림 확인\n빨간불이 들어와 있는지 확인하세요.", "카드리더기: IC칩 방향 확인 및 단말기 재부팅\n'MS 읽기' 문구가 뜨면 IC칩 방향이 반대인 것입니다.", "포스기 본체: 전원 버튼 조작 안내\n모니터 우측 하단이나 후면 전원 버튼을 확인하세요."] },
            res_hw_pos: { title: "포스기 / 키오스크 대응", icon: "monitor", type: "success", list: ["포스기 본체 전원 확인\n어댑터 연결 및 전원 버튼 상태를 확인하세요.", "터치 불량 시 윈도우 보정\n제어판에서 터치 보정을 진행하세요.", "네트워크 연결 확인\n랜선(LAN)이 제대로 꽂혀 있는지 핑 테스트를 진행하세요."] },
            res_hw_printer: { title: "프린터 (영수증/주방) 대응", icon: "printer", type: "success", list: ["프린터 에러등 확인\n용지가 끼었거나 덮개가 제대로 닫히지 않았는지 확인하세요.", "연결 케이블 재장착\n프린터 뒷면의 케이블을 뺐다가 다시 꽉 꽂아보세요."] },

                            if (row.type === 'content') dbContents[row.id] = row.data;
                        });
                        if (Object.keys(dbSteps).length > 0) setSteps(dbSteps);
                        if (Object.keys(dbContents).length > 0) setContents(dbContents);
                        alert('DB에서 최신 가이드를 성공적으로 불러왔습니다!');
                    } else {
                        alert('DB에 저장된 데이터가 없습니다.');
                    }
                } catch (err) {
                    console.error(err); alert('불러오기 실패: ' + err.message);
                } finally { setIsLoadingDb(false); }
            };

            const deployToDB = async () => {
                if (!supabase) return alert('먼저 Supabase 연결 설정을 완료해주세요.');
                if (!confirm('현재 내 PC의 가이드를 DB에 덮어씁니다. 진행할까요?')) return;
                setIsLoadingDb(true);
                try {
                    const payload = [];
                    Object.keys(steps).forEach(k => payload.push({ id: k, type: 'step', data: steps[k] }));
                    Object.keys(contents).forEach(k => payload.push({ id: k, type: 'content', data: contents[k] }));

                    const { error } = await supabase.from('cs_guide_data').upsert(payload);
                    if (error) throw error;
                    alert('모든 가이드가 최신버전으로 DB에 배포되었습니다!');
                } catch (err) {
                    console.error(err); alert('저장 실패: ' + err.message);
                } finally { setIsLoadingDb(false); }
            };

            const navigateTo = (nextStep, choiceLabel) => {
                setHistory(prev => [...prev, { step: activeStep, tag: choiceLabel }]);
                setActiveStep(nextStep);
            };

            const goBack = () => {
                if (history.length > 0) {
                    const prevStep = history[history.length - 1];
                    setHistory(prev => prev.slice(0, -1));
                    setActiveStep(prevStep.step);
                }
            };

            const openChoiceModal = (index = null) => {
                if (index !== null) {
                    setModalState({ isOpen: true, stepKey: activeStep, choiceIndex: index, data: steps[activeStep].choices[index] });
                } else {
                    setModalState({ isOpen: true, stepKey: activeStep, choiceIndex: null, data: null });
                }
            };

            const handleSaveChoice = (choiceData, createNewTarget) => {
                if (createNewTarget) {
                    if (createNewTarget.type === 'Step') {
                        setSteps(prev => ({ ...prev, [createNewTarget.id]: { id: createNewTarget.id, title: createNewTarget.title, description: "새로 추가된 화면입니다.", icon: "star", choices: [] } }));
                    } else {
                        setContents(prev => ({ ...prev, [createNewTarget.id]: { title: createNewTarget.title, icon: "check-circle", type: "success", list: [] } }));
                    }
                }

                setSteps(prev => {
                    const newSteps = { ...prev };
                    const choices = [...newSteps[modalState.stepKey].choices];
                    if (modalState.choiceIndex !== null) {
                        choices[modalState.choiceIndex] = choiceData;
                    } else {
                        choices.push(choiceData);
                    }
                    newSteps[modalState.stepKey].choices = choices;
                    return newSteps;
                });
                setModalState({ isOpen: false, stepKey: null, choiceIndex: null, data: null });
            };

            const handleDeleteChoice = (index) => {
                if (confirm("이 선택지를 삭제할까요?")) {
                    setSteps(prev => {
                        const newSteps = { ...prev };
                        newSteps[activeStep].choices.splice(index, 1);
                        return newSteps;
                    });
                }
            };

            // Existing list manage functions...
            const addItem = (stepKey) => {
                if (!newItem.trim()) return;
                setContents(prev => ({ ...prev, [stepKey]: { ...prev[stepKey], list: [...prev[stepKey].list, newItem.trim()] } }));
                setNewItem("");
            };
            const removeItem = (stepKey, index) => {
                setContents(prev => {
                    const newList = [...prev[stepKey].list];
                    newList.splice(index, 1);
                    return { ...prev, [stepKey]: { ...prev[stepKey], list: newList } };
                });
            };
            const updateItem = (stepKey, index, newText) => {
                setContents(prev => {
                    const newList = [...prev[stepKey].list];
                    newList[index] = newText;
                    return { ...prev, [stepKey]: { ...prev[stepKey], list: newList } };
                });
            };
            const moveOrCopyItem = (sourceKey, targetKey, index, actionType) => {
                setContents(prev => {
                    const newSourceList = [...prev[sourceKey].list];
                    const itemText = newSourceList[index];
                    if (actionType === 'move') newSourceList.splice(index, 1);
                    const newTargetList = [...prev[targetKey].list, itemText];
                    return { ...prev, [sourceKey]: { ...prev[sourceKey], list: newSourceList }, [targetKey]: { ...prev[targetKey], list: newTargetList } };
                });
            };

            const exportToExcel = () => {
                // ... same export ...
                let csvContent = "\uFEFF분류,대응 지침\n";
                Object.keys(contents).forEach(key => {
                    contents[key].list.forEach(item => { csvContent += `"${contents[key].title}","${item.replace(/"/g, '""')}"\n`; });
                });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' })));
                link.setAttribute("download", "비버웍스_고객상담_대응지침.csv");
                document.body.appendChild(link);
                link.click();
            };

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center max-w-[1200px] mx-auto">
                    {/* 공통 헤더 */}
                    <header className="mb-14 text-center animate-fade-in relative w-full">
                        <div className="absolute right-0 top-0 flex items-center gap-2">
                            {supabase && (
                                <div className="flex bg-slate-100 rounded-2xl p-1 shadow-inner border border-slate-200">
                                    <button onClick={loadFromDB} disabled={isLoadingDb} className="px-3 py-2 text-sm font-bold text-slate-600 hover:text-blue-600 hover:bg-white rounded-xl transition-all flex items-center gap-1"><Icon name="cloud-download" size={14} /> DB동기화</button>
                                    <button onClick={deployToDB} disabled={isLoadingDb} className="px-3 py-2 text-sm font-bold text-slate-600 hover:text-emerald-600 hover:bg-white rounded-xl transition-all flex items-center gap-1"><Icon name="cloud-upload" size={14} /> 배포하기</button>
                                </div>
                            )}
                            <button onClick={() => setIsSbModalOpen(true)} className="p-2.5 text-slate-400 hover:bg-slate-100 hover:text-slate-700 rounded-2xl transition-all" title="DB 설정"><Icon name="database" size={20} /></button>
                            <button onClick={() => setEditMode(!editMode)} className={`px-4 py-2.5 rounded-2xl font-bold flex items-center gap-2 shadow-lg transition-all ${editMode ? 'bg-indigo-600 text-white shadow-indigo-600/30' : 'bg-white text-slate-700 border-2 border-slate-200 hover:border-blue-400'}`}>
                                <Icon name={editMode ? 'check' : 'edit-3'} size={16} /> {editMode ? '편집 모드 완료' : '화면 편집 켜기'}
                            </button>
                        </div>
                        <div className="inline-flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-full text-xs font-black tracking-widest uppercase mb-6 shadow-xl shadow-blue-200 mt-2">
                            <Icon name="headset" size={14} /> Technical Support Team
                        </div>
                        <h1 className="text-5xl font-black text-slate-900 mb-4 tracking-tighter italic">RESPONSE <span className="text-blue-600">GUIDE</span></h1>
                        <p className="text-slate-400 font-bold text-lg">고객상담 스마트 가이드 & 메모 보드</p>
                    </header>

                    <div className="w-full flex flex-col lg:flex-row gap-8 items-start justify-center flex-grow">
                        {/* Main Content Area */}
                        <div className="w-full flex-1 flex justify-center min-w-0">
                            {steps[activeStep] ? (
                                <Step title={steps[activeStep].title} icon={steps[activeStep].icon} description={steps[activeStep].description} onBack={activeStep !== 'start' ? goBack : undefined}>
                                    <div className={`grid grid-cols-1 ${steps[activeStep].choices.length > 3 ? 'sm:grid-cols-2' : ''} gap-4 w-full max-w-3xl`}>
                                        {steps[activeStep].choices.map((choice, idx) => (
                                            <ChoiceButton
                                                key={choice.id}
                                                label={choice.label}
                                                sublabel={choice.sublabel}
                                                icon={choice.icon}
                                                color={choice.color || "blue"}
                                                onClick={() => {
                                                    if (editMode) {
                                                        openChoiceModal(idx);
                                                    } else {
                                                        navigateTo(choice.target, choice.label);
                                                    }
                                                }}
                                                editMode={editMode}
                                                onEdit={() => openChoiceModal(idx)}
                                                onDelete={() => handleDeleteChoice(idx)}
                                            />
                                        ))}
                                        {editMode && (
                                            <button onClick={() => openChoiceModal(null)} className="h-full min-h-[100px] py-4 border-2 border-dashed border-slate-300 rounded-[2rem] text-slate-500 font-bold hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50/50 flex flex-col justify-center items-center gap-2 transition-all shadow-sm">
                                                <Icon name="plus" size={24} /> <span>선택지 추가하기</span>
                                            </button>
                                        )}
                                    </div>
                                </Step>
                            ) : contents[activeStep] ? (
                                <ResultCard
                                    stepKey={activeStep}
                                    data={contents[activeStep]}
                                    categories={categories}
                                    newItem={newItem}
                                    setNewItem={setNewItem}
                                    addItem={addItem}
                                    removeItem={removeItem}
                                    updateItem={updateItem}
                                    moveOrCopyItem={moveOrCopyItem}
                                    onReset={() => { setMemoData({ storeName: '', bizNum: '', issue: '' }); setHistory([]); setActiveStep('start'); }}
                                    onBack={goBack}
                                />
                            ) : (
                                <div className="text-center py-20">
                                    <Icon name="alert-triangle" size={48} className="mx-auto text-rose-500 mb-4" />
                                    <h2 className="text-2xl font-bold text-slate-800">오류가 발생했습니다</h2>
                                    <p className="text-slate-500 mt-2">해당 화면(ID: {activeStep})을 찾을 수 없습니다.</p>
                                    <button onClick={goBack} className="mt-6 px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">뒤로가기</button>
                                </div>
                            )}
                        </div>

                        {/* Right Panel - Sticky Memo */}
                        <div className="w-full lg:w-[360px] flex-shrink-0 animate-fade-in relative z-10">
                            <div className="sticky top-8 bg-white border-2 border-slate-200 rounded-[2rem] p-6 shadow-xl shadow-slate-200/50">
                                <h3 className="text-xl font-black text-slate-800 mb-5 flex items-center gap-2">
                                    <span className="p-2 bg-blue-100 text-blue-600 rounded-full"><Icon name="edit-3" size={18} /></span> 상담 메모
                                </h3>

                                <div className="space-y-4 mb-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">매장명</label>
                                        <input value={memoData.storeName} onChange={e => setMemoData({ ...memoData, storeName: e.target.value })} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 placeholder:text-slate-300 transition-colors focus:border-blue-400 focus:bg-white focus:outline-none" placeholder="예: 비버카페 강남점" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">사업자번호 / 연락처</label>
                                        <input value={memoData.bizNum} onChange={e => setMemoData({ ...memoData, bizNum: e.target.value })} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder:text-slate-300 transition-colors focus:border-blue-400 focus:bg-white focus:outline-none" placeholder="예: 123-45-67890" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">고객 문의내용</label>
                                        <textarea value={memoData.issue} onChange={e => setMemoData({ ...memoData, issue: e.target.value })} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl h-28 resize-none text-slate-800 placeholder:text-slate-300 transition-colors focus:border-blue-400 focus:bg-white focus:outline-none custom-scrollbar" placeholder="요청 사항을 자유롭게 메모하세요..."></textarea>
                                    </div>
                                </div>

                                <div className="border-t border-slate-100 pt-5">
                                    <label className="block text-xs font-bold text-slate-500 mb-2">선택한 분류 경로</label>
                                    <div className="flex flex-wrap gap-2">
                                        {history.filter(h => h.tag && h.tag !== "상황 파악 완료").map((h, i) => (
                                            <span key={i} className="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-sm font-bold border border-blue-100 flex items-center gap-1 shadow-sm"><Icon name="check" size={12} /> {h.tag}</span>
                                        ))}
                                        {history.filter(h => h.tag && h.tag !== "상황 파악 완료").length === 0 && <span className="text-xs text-slate-400 mt-1">아직 선택된 분류가 없습니다.</span>}
                                    </div>
                                </div>

                                <button onClick={() => {
                                    if (confirm('진행 상황과 메모를 모두 초기화하시겠습니까?')) {
                                        setMemoData({ storeName: '', bizNum: '', issue: '' });
                                        setHistory([]);
                                        setActiveStep('start');
                                    }
                                }} className="w-full mt-6 py-3.5 bg-slate-50 text-slate-500 hover:bg-rose-50 hover:text-rose-600 font-bold rounded-xl transition-all border border-slate-200 flex items-center justify-center gap-2 group shadow-sm">
                                    <Icon name="rotate-ccw" size={16} className="group-hover:-rotate-180 transition-transform duration-500" /> 상담 종료 / 리셋
                                </button>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-24 w-full border-t border-slate-200 pt-10">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4 text-slate-400 font-bold text-sm">
                                <Icon name="info" size={16} />
                                <span>장비별 하위 분류 및 모든 항목 편집 기능 장착 완료</span>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={exportToExcel} className="flex items-center gap-2 px-6 py-3 bg-emerald-600 text-white rounded-2xl font-black hover:bg-emerald-700 transition-all text-sm shadow-md active:scale-95">
                                    <Icon name="download" size={16} /> 엑셀 파일 다운로드
                                </button>
                            </div>
                        </div>
                    </footer>

                    <ChoiceEditModal
                        isOpen={modalState.isOpen}
                        onClose={() => setModalState({ isOpen: false, stepKey: null, choiceIndex: null, data: null })}
                        choiceData={modalState.data}
                        onSave={handleSaveChoice}
                        allTargets={allTargets}
                    />

                    {/* Supabase 설정 모달 */}
                    {isSbModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-8 relative">
                                <button onClick={() => setIsSbModalOpen(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-600"><Icon name="x" size={24} /></button>
                                <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2"><Icon name="database" size={24} className="text-emerald-500" /> Database 연결 연결</h2>
                                <p className="text-slate-500 text-sm font-medium mb-6">Supabase URL과 Anon Key를 입력하면 모든 데이터가 데이터베이스에 저장되고 실시간으로 공유됩니다.</p>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">Project URL</label>
                                        <input value={sbConfig.url} onChange={e => setSbConfig({ ...sbConfig, url: e.target.value })} className="w-full p-4 border-2 border-slate-200 rounded-2xl text-slate-800 font-mono text-sm focus:border-emerald-500 outline-none" placeholder="https://xxxx.supabase.co" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">Project API Key (anon/public)</label>
                                        <input value={sbConfig.key} onChange={e => setSbConfig({ ...sbConfig, key: e.target.value })} className="w-full p-4 border-2 border-slate-200 rounded-2xl text-slate-800 font-mono text-sm focus:border-emerald-500 outline-none" placeholder="eyJhbG..." />
                                    </div>
                                </div>
                                <button onClick={() => {
                                    localStorage.setItem('cs_guide_sb_config', JSON.stringify(sbConfig));
                                    setIsSbModalOpen(false);
                                    alert("설정이 저장되었습니다. 우측 상단의 [DB에서 최신화] 버튼을 눌러보세요.");
                                }} className="w-full mt-8 py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-500/30 hover:bg-emerald-700 transition-colors">접속 정보 저장</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
