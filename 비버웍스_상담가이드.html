<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비버웍스 CS 상담 응대 가이드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Accordion Transition */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }
        .accordion-open .accordion-content {
            max-height: 1200px;
            padding-top: 12px;
            padding-bottom: 12px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HANGUL SEARCH UTILS ---
        const getChoseong = (str) => {
            const choseongList = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            let result = "";
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) result += choseongList[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        };

        const matchSearch = (target, query) => {
            if (!query) return true;
            const normalizedTarget = target.toLowerCase().replace(/\s/g, "");
            const normalizedQuery = query.toLowerCase().replace(/\s/g, "");
            if (normalizedTarget.includes(normalizedQuery)) return true;
            const choseongTarget = getChoseong(normalizedTarget);
            return choseongTarget.includes(normalizedQuery);
        };

        // --- GLOBAL COMPONENTS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Step = ({ title, description, children, icon, color = "blue", onBack }) => (
            <div className="flex flex-col items-center animate-fade-in text-center relative w-full">
                {onBack && (
                    <button onClick={onBack} className="absolute -top-12 left-0 flex items-center gap-1 text-slate-400 hover:text-blue-600 font-bold transition-colors group">
                        <Icon name="arrow-left" size={18} className="group-hover:-translate-x-1 transition-transform" />
                        <span>이전으로</span>
                    </button>
                )}
                <div className={`w-20 h-20 rounded-full bg-${color}-100 flex items-center justify-center mb-6 border-4 border-white shadow-xl`}>
                    <Icon name={icon} size={40} className={`text-${color}-600`} />
                </div>
                <h2 className="text-3xl font-black text-slate-900 mb-3 tracking-tight">{title}</h2>
                <p className="text-slate-500 mb-10 max-w-lg leading-relaxed whitespace-pre-line text-lg font-medium">{description}</p>
                <div className="grid grid-cols-1 gap-4 w-full max-w-md">
                    {children}
                </div>
            </div>
        );

        const ChoiceButton = ({ label, onClick, sublabel, icon, color = "blue" }) => (
            <button
                onClick={onClick}
                className={`group relative flex items-center p-6 bg-white border-2 border-slate-200 rounded-3xl hover:border-${color}-500 hover:shadow-2xl hover:shadow-${color}-100 transition-all duration-300 text-left overflow-hidden`}
            >
                <div className="flex-grow">
                    <span className={`block font-bold text-xl text-slate-800 group-hover:text-${color}-600 mb-1`}>{label}</span>
                    {sublabel && <span className="text-sm text-slate-400 group-hover:text-slate-500">{sublabel}</span>}
                </div>
                {icon && <Icon name={icon} className={`text-slate-300 group-hover:text-${color}-500 transition-colors`} />}
                <div className={`absolute bottom-0 left-0 h-1.5 w-0 bg-${color}-500 transition-all duration-300 group-hover:w-full`}></div>
            </button>
        );

        // --- URL LINKIFY COMPONENT ---
        const Linkify = ({ text }) => {
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/g;
            const parts = text.split(urlRegex);
            return parts.map((part, i) => {
                if (part.match(urlRegex)) {
                    const href = part.startsWith('www.') ? `http://${part}` : part;
                    return (
                        <a key={i} href={href} target="_blank" rel="noopener noreferrer" className="text-blue-500 underline hover:text-blue-700 break-all" onClick={(e) => e.stopPropagation()}>
                            {part}
                        </a>
                    );
                }
                return part;
            });
        };

        const ResultCard = ({ stepKey, data, categories, newItem, setNewItem, addItem, removeItem, updateItem, moveOrCopyItem, onReset, onBack }) => {
            const [searchTerm, setSearchTerm] = useState("");
            const [expandedIdx, setExpandedIdx] = useState(null);
            const [editingIdx, setEditingIdx] = useState(null);
            const [editingText, setEditingText] = useState("");

            // 이동/복사 모달 상태
            const [actionModal, setActionModal] = useState({ isOpen: false, itemIndex: null, itemText: "" });
            const [selectedTarget, setSelectedTarget] = useState("");
            const [actionType, setActionType] = useState("copy"); // copy, move

            const openActionModal = (e, idx, text) => {
                e.stopPropagation();
                setActionModal({ isOpen: true, itemIndex: idx, itemText: text });
                setSelectedTarget("");
                setActionType("copy");
            };

            const handleActionSubmit = () => {
                if (!selectedTarget) {
                    alert("이동/복사할 대상 분류를 선택해주세요.");
                    return;
                }
                moveOrCopyItem(stepKey, selectedTarget, actionModal.itemIndex, actionType);
                setActionModal({ isOpen: false, itemIndex: null, itemText: "" });
            };

            const filteredList = useMemo(() => {
                return data.list.filter(item => matchSearch(item, searchTerm));
            }, [data.list, searchTerm]);

            const toggleAccordion = (idx) => {
                if (editingIdx !== null) return; 
                setExpandedIdx(expandedIdx === idx ? null : idx);
            };

            const startEditing = (e, idx, text) => {
                e.stopPropagation();
                setEditingIdx(idx);
                setEditingText(text);
                setExpandedIdx(idx);
            };

            const saveEdit = (idx) => {
                updateItem(stepKey, idx, editingText);
                setEditingIdx(null);
            };

            const cancelEdit = () => {
                setEditingIdx(null);
                setEditingText("");
            };

            return (
                <div className={`w-full max-w-2xl p-8 rounded-[2.5rem] border-2 ${data.type === 'success' ? 'bg-emerald-50 border-emerald-100 shadow-emerald-50' : 'bg-rose-50 border-rose-100 shadow-rose-50'} shadow-2xl animate-fade-in`}>
                    <div className="flex flex-col gap-6 mb-8">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center">
                                <div className={`p-4 rounded-2xl ${data.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'} text-white mr-4 shadow-lg shadow-current/20`}>
                                    <Icon name={data.icon} size={32} />
                                </div>
                                <h3 className={`text-2xl font-black tracking-tight ${data.type === 'success' ? 'text-emerald-900' : 'text-rose-900'}`}>{data.title}</h3>
                            </div>
                        </div>

                        <div className="relative">
                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input 
                                type="text"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                placeholder="대응 지침 검색 (초성 입력 가능: ㅂㅂ)"
                                className="w-full pl-12 pr-4 py-4 bg-white/80 backdrop-blur border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none font-bold text-slate-700 shadow-inner"
                            />
                        </div>
                    </div>

                    <div className="space-y-3 mb-8 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar text-left">
                        {filteredList.length > 0 ? filteredList.map((item, idx) => {
                            const originalIdx = data.list.indexOf(item);
                            const isEditing = editingIdx === originalIdx;

                            return (
                                <div 
                                    key={originalIdx} 
                                    className={`group bg-white rounded-2xl border transition-all ${expandedIdx === originalIdx ? 'border-blue-400 shadow-lg ring-1 ring-blue-100 accordion-open' : 'border-slate-200 hover:border-slate-300'}`}
                                >
                                    <div className="w-full flex items-center p-4 text-left cursor-pointer" onClick={() => toggleAccordion(originalIdx)}>
                                        <div className={`mr-3 flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center ${data.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                            <Icon name={expandedIdx === originalIdx ? "minus" : "plus"} size={14} />
                                        </div>
                                        <span className="flex-grow text-slate-700 font-bold text-lg truncate">
                                            {item.split('\n')[0]}
                                        </span>
                                        <Icon name="chevron-down" size={18} className={`text-slate-300 transition-transform ${expandedIdx === originalIdx ? 'rotate-180' : ''}`} />
                                    </div>
                                    
                                    <div className="accordion-content px-4 sm:px-12">
                                        <div className="border-t border-slate-50 pt-4">
                                            {isEditing ? (
                                                <div className="flex flex-col gap-3 mb-4">
                                                    <textarea 
                                                        value={editingText}
                                                        onChange={(e) => setEditingText(e.target.value)}
                                                        className="w-full p-4 bg-slate-50 border-2 border-blue-200 rounded-xl focus:outline-none font-medium text-slate-700 min-h-[120px]"
                                                        autoFocus
                                                    />
                                                    <div className="flex justify-end gap-2">
                                                        <button 
                                                            onClick={cancelEdit}
                                                            className="px-4 py-2 bg-slate-100 text-slate-500 rounded-lg font-bold hover:bg-slate-200 transition-all text-sm"
                                                        >
                                                            취소
                                                        </button>
                                                        <button 
                                                            onClick={() => saveEdit(originalIdx)}
                                                            className="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-all text-sm"
                                                        >
                                                            저장하기
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <p className="text-slate-600 font-medium whitespace-pre-line pb-2 leading-relaxed">
                                                    <Linkify text={item} />
                                                </p>
                                            )}
                                        </div>
                                        {!isEditing && (
                                            <div className="flex justify-end gap-2 pb-4 flex-wrap mt-2">
                                                <button 
                                                    onClick={(e) => openActionModal(e, originalIdx, item)}
                                                    className="flex items-center gap-1.5 px-3 py-1.5 text-indigo-500 hover:text-indigo-700 hover:bg-indigo-50 rounded-lg transition-all text-sm font-bold"
                                                >
                                                    <Icon name="folder-input" size={14} /> 이동/복사
                                                </button>
                                                <button 
                                                    onClick={(e) => startEditing(e, originalIdx, item)}
                                                    className="flex items-center gap-1.5 px-3 py-1.5 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all text-sm font-bold"
                                                >
                                                    <Icon name="pencil" size={14} /> 수정하기
                                                </button>
                                                <button 
                                                    onClick={(e) => { e.stopPropagation(); removeItem(stepKey, originalIdx); }}
                                                    className="flex items-center gap-1.5 px-3 py-1.5 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-all text-sm font-bold"
                                                >
                                                    <Icon name="trash-2" size={14} /> 삭제하기
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        }) : (
                            <div className="py-20 text-center">
                                <Icon name="search-x" size={48} className="mx-auto text-slate-200 mb-4" />
                                <p className="text-slate-400 font-bold italic">검색 결과가 없습니다.</p>
                            </div>
                        )}
                    </div>

                    <div className="relative mb-8">
                        <input 
                            type="text" 
                            value={newItem}
                            onChange={(e) => setNewItem(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && addItem(stepKey)}
                            placeholder="새로운 대응 지침 추가..."
                            className="w-full p-4 pr-16 bg-white border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none font-bold text-slate-700 placeholder:text-slate-300 shadow-sm"
                        />
                        <button 
                            onClick={() => addItem(stepKey)}
                            className="absolute right-2 top-2 bottom-2 px-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 transition-colors shadow-lg"
                        >
                            <Icon name="plus" size={20} />
                        </button>
                    </div>

                    <div className="flex gap-3 mt-4">
                        <button onClick={onBack} className="flex-1 flex items-center justify-center py-5 bg-white border-2 border-slate-200 text-slate-600 rounded-[1.5rem] font-black text-lg hover:bg-slate-50 transition-all active:scale-95">
                            <Icon name="arrow-left" size={20} className="mr-3" /> 이전으로
                        </button>
                        <button onClick={onReset} className="flex-[2] flex items-center justify-center py-5 bg-slate-900 text-white rounded-[1.5rem] font-black text-lg hover:bg-black transition-all shadow-xl active:scale-95">
                            <Icon name="rotate-ccw" size={20} className="mr-3" /> 처음으로
                        </button>
                    </div>

                    {/* 이동/복사 모달 */}
                    {actionModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl animate-fade-in text-left">
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                                    <Icon name="copy" className="text-blue-500" /> 지침 이동 및 복사
                                </h3>
                                <p className="text-sm text-slate-600 mb-6 truncate bg-slate-50 border border-slate-200 p-3 rounded-xl font-medium">
                                    {actionModal.itemText.split('\n')[0]}
                                </p>
                                
                                <div className="flex gap-2 mb-6">
                                    <button 
                                        onClick={() => setActionType('copy')}
                                        className={`flex-1 py-3 rounded-xl font-bold transition-all border-2 flex items-center justify-center gap-2 ${actionType === 'copy' ? 'bg-blue-50 border-blue-500 text-blue-600' : 'border-slate-200 text-slate-400 hover:border-slate-300'}`}
                                    >
                                        <Icon name="copy" size={18} /> 복사하기
                                    </button>
                                    <button 
                                        onClick={() => setActionType('move')}
                                        className={`flex-1 py-3 rounded-xl font-bold transition-all border-2 flex items-center justify-center gap-2 ${actionType === 'move' ? 'bg-indigo-50 border-indigo-500 text-indigo-600' : 'border-slate-200 text-slate-400 hover:border-slate-300'}`}
                                    >
                                        <Icon name="folder-input" size={18} /> 이동하기
                                    </button>
                                </div>

                                <div className="mb-8">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">대상 분류 선택</label>
                                    <select 
                                        value={selectedTarget} 
                                        onChange={(e) => setSelectedTarget(e.target.value)}
                                        className="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none font-bold text-slate-700 bg-white"
                                    >
                                        <option value="" disabled>분류를 선택해주세요</option>
                                        {categories.filter(c => c.id !== stepKey).map(c => (
                                            <option key={c.id} value={c.id}>{c.title}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={() => setActionModal({isOpen: false})} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-colors">취소</button>
                                    <button 
                                        onClick={handleActionSubmit} 
                                        className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-colors"
                                    >
                                        확인
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- INITIAL DATA ---
        const INITIAL_CONTENT = {
            res_error: { title: "프로그램 오류 대응", icon: "alert-circle", type: "success", list: ["정확한 오류 메시지나 팝업 내용 확인\n어떤 화면에서 어떤 문구가 발생하는지 확인하세요.", "프로그램 강제 종료(Alt+F4) 및 재실행 안내\n재실행 후에도 동일한지 확인이 필요합니다.", "해결 안 될 시 원격 지원 도구 실행\n애니데스크(AnyDesk) 번호를 확인받으세요.", "로그인 오류 시 계정 정보 재확인\n비밀번호 대소문자 구분을 확인하세요."] },
            res_hardware: { title: "장비/하드웨어 대응", icon: "hard-drive", type: "success", list: ["전원 플러그 및 USB 케이블 연결 상태 확인\n간혹 발에 채여 빠지는 경우가 많습니다.", "프린터: 용지 잔량 및 걸림 확인\n빨간불이 들어와 있는지 확인하세요.", "카드리더기: IC칩 방향 확인 및 단말기 재부팅\n'MS 읽기' 문구가 뜨면 IC칩 방향이 반대인 것입니다.", "포스기 본체: 전원 버튼 조작 안내\n모니터 우측 하단이나 후면 전원 버튼을 확인하세요."] },
            res_setting: { title: "설정 및 기능 안내", icon: "settings", type: "success", list: ["관리자 페이지(어드민) 접속 여부 확인\n로그인 정보를 모를 경우 본사 확인이 필요합니다.", "메뉴 수정/품절 설정 안내\n판매관리 > 메뉴관리에서 수정 가능합니다.", "테이블 배치 편집 모드 안내\n환경설정에서 테이블 위치를 드래그할 수 있습니다.", "관련 매뉴얼 PDF 전송\n카카오톡 채널을 통해 링크를 전송하세요."] },
            res_payment: { title: "결제 및 내역 확인", icon: "credit-card", type: "success", warning: "개인정보 보호를 위해 전체 카드번호는 묻지 마세요.", list: ["통합 어드민 시스템 접속\n결제 조회 메뉴를 활용하세요.", "카드번호 앞 8자리, 결제 일시 확인\n정확한 조회를 위해 필요합니다.", "승인번호 조회\n영수증이 있다면 승인번호가 가장 정확합니다.", "카드사 반영 기간 안내\n취소 시 영업일 기준 3-5일 소요됨을 알리세요."] },
            res_paik_1: { title: "[빽다방] 프로그램 오류", icon: "alert-circle", type: "success", list: ["비버/우노스 버전 확인\n빽다방은 매장별로 버전이 상이할 수 있습니다.", "키오스크 재시작\n키오스크 후면의 스위치를 껐다 켜주세요.", "주방 프린터 출력 설정 확인\n포스에서 주방 출력 여부가 체크되어 있는지 보세요."] },
            res_paik_2: { title: "[빽다방] 장비 문제", icon: "hard-drive", type: "success", list: ["바코드 스캐너 인식 점검\n스캐너 유리에 이물질이 있는지 닦아보세요.", "영수증 프린터 헤드 청소\n인쇄가 흐릿할 경우 알코올 솜으로 닦으세요.", "카드 단말기 펌웨어 확인\n최신 버전이 아닐 경우 본사 업데이트 공지를 확인하세요."] },
            res_paik_3: { title: "[빽다방] 설정 및 쿠폰", icon: "settings", type: "success", warning: "본사 하달 공지사항을 반드시 먼저 확인하세요.", list: ["멤버십 쿠폰 적용 오류 확인\n고객의 앱 화면에서 유효기간을 확인하세요.", "신메뉴 옵션 설정 확인\n샷 추가, 당도 선택 등 옵션값이 맞는지 보세요.", "본사 프로모션 세팅 확인\n행사 품목의 가격이 0원으로 뜨는지 확인하세요."] },
            res_oq_1: { title: "[오더퀸] 프로그램 오류", icon: "alert-circle", type: "success", list: ["오더퀸 버전 확인\n최신 버전 업데이트 여부를 확인하세요.", "키오스크/포스 재시작\n기기를 재부팅하여 증상이 동일한지 확인합니다.", "원격 지원 연결\n오더퀸 전용 원격 프로그램으로 접속하세요."] },
            res_oq_2: { title: "[오더퀸] 장비 문제", icon: "hard-drive", type: "success", list: ["바코드 스캐너 점검\n스캐너 포트 연결 상태를 확인하세요.", "영수증 프린터 상태 확인\n용지 걸림 및 전원 상태를 체크하세요.", "카드 단말기 확인\n단말기 재부팅 및 케이블을 재연결해보세요."] },
            res_oq_3: { title: "[오더퀸] 설정 및 기능", icon: "settings", type: "success", list: ["메뉴 및 품절 설정\n오더퀸 관리자 웹에서 메뉴 설정을 확인하세요.", "키오스크 UI 설정\n관리자 페이지에서 화면 구성을 확인하세요.", "매장 운영 시간 변경\n영업시간 및 브레이크 타임 설정을 안내하세요."] },
            res_pay_service: { title: "결제 서비스 대응 (비버페이/바로페이/PG)", icon: "credit-card", type: "success", list: ["비버페이/바로페이 결제 누락 확인\n정산 페이지에서 해당 거래 건이 있는지 대조하세요.", "PG 결제 승인 여부 확인\n카드사 및 PG사 관리자 페이지에서 승인번호로 조회하세요.", "입금 예정 금액 확인\n정산 주기 및 수수료 제외 금액을 안내하세요.", "기타 결제 취소 요청 처리\n부분 취소 또는 전액 취소 가능 여부를 확인하세요."] }
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeStep, setActiveStep] = useState('start');
            const [history, setHistory] = useState([]);
            const [contents, setContents] = useState(() => {
                const saved = localStorage.getItem('cs_guide_contents_v7');
                return saved ? JSON.parse(saved) : INITIAL_CONTENT;
            });
            const [newItem, setNewItem] = useState("");

            const categories = Object.keys(contents).map(key => ({
                id: key,
                title: contents[key].title
            }));

            useEffect(() => {
                localStorage.setItem('cs_guide_contents_v7', JSON.stringify(contents));
            }, [contents]);

            const navigateTo = (nextStep) => {
                setHistory(prev => [...prev, activeStep]);
                setActiveStep(nextStep);
            };

            const goBack = () => {
                if (history.length > 0) {
                    const prevStep = history[history.length - 1];
                    setHistory(prev => prev.slice(0, -1));
                    setActiveStep(prevStep);
                }
            };

            const addItem = (stepKey) => {
                if (!newItem.trim()) return;
                setContents(prev => ({
                    ...prev,
                    [stepKey]: {
                        ...prev[stepKey],
                        list: [...prev[stepKey].list, newItem.trim()]
                    }
                }));
                setNewItem("");
            };

            const removeItem = (stepKey, index) => {
                setContents(prev => {
                    const newList = [...prev[stepKey].list];
                    newList.splice(index, 1);
                    return {
                        ...prev,
                        [stepKey]: { ...prev[stepKey], list: newList }
                    };
                });
            };

            const updateItem = (stepKey, index, newText) => {
                setContents(prev => {
                    const newList = [...prev[stepKey].list];
                    newList[index] = newText;
                    return {
                        ...prev,
                        [stepKey]: { ...prev[stepKey], list: newList }
                    };
                });
            };

            const moveOrCopyItem = (sourceKey, targetKey, index, actionType) => {
                setContents(prev => {
                    const newSourceList = [...prev[sourceKey].list];
                    const itemText = newSourceList[index];
                    
                    if (actionType === 'move') {
                        newSourceList.splice(index, 1);
                    }
                    
                    const newTargetList = [...prev[targetKey].list];
                    newTargetList.push(itemText);

                    return {
                        ...prev,
                        [sourceKey]: { ...prev[sourceKey], list: newSourceList },
                        [targetKey]: { ...prev[targetKey], list: newTargetList }
                    };
                });
            };

            const exportToExcel = () => {
                let csvContent = "\uFEFF"; // BOM for Excel UTF-8
                csvContent += "분류,대응 지침\n";

                Object.keys(contents).forEach(key => {
                    const section = contents[key];
                    section.list.forEach(item => {
                        const escapedItem = item.replace(/"/g, '""');
                        csvContent += `"${section.title}","${escapedItem}"\n`;
                    });
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "비버웍스_고객상담_대응지침.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen py-12 px-4 flex flex-col items-center max-w-4xl mx-auto">
                    <header className="mb-16 text-center animate-fade-in">
                        <div className="inline-flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-full text-xs font-black tracking-widest uppercase mb-6 shadow-xl shadow-blue-200">
                            <Icon name="headset" size={14} /> Technical Support Team
                        </div>
                        <h1 className="text-5xl font-black text-slate-900 mb-4 tracking-tighter italic">RESPONSE <span className="text-blue-600">GUIDE</span></h1>
                        <p className="text-slate-400 font-bold text-lg">비버웍스 고객상담센터 스마트 순서도</p>
                    </header>

                    <div className="w-full flex justify-center flex-grow">
                        {activeStep === 'start' && (
                            <Step title="1단계: 인사 및 경청" icon="user" description={`"반갑습니다. 고객센터 상담사 OOO입니다."\n고객의 불편 사항을 메모하며 끝까지 들어주세요.`}>
                                <ChoiceButton label="상황 파악 완료" sublabel="문의 내용을 청취했습니다." onClick={() => navigateTo('program_check')} icon="chevron-right" />
                            </Step>
                        )}

                        {activeStep === 'program_check' && (
                            <Step title="2단계: 프로그램 확인" icon="monitor" description="고객이 현재 사용 중인 프로그램을 선택하세요." onBack={goBack}>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-3xl">
                                    <ChoiceButton label="비버 (Beaver)" onClick={() => navigateTo('category')} icon="chevron-right" />
                                    <ChoiceButton label="우노스 (Unos)" onClick={() => navigateTo('category')} icon="chevron-right" />
                                    <ChoiceButton label="빽다방 (Paik's)" onClick={() => navigateTo('paik_category')} color="amber" icon="coffee" />
                                    <ChoiceButton label="오더퀸 (OrderQueen)" onClick={() => navigateTo('oq_category')} color="purple" icon="chevron-right" />
                                    <ChoiceButton label="비버페이 / 바로페이 / PG" sublabel="결제내역 확인 및 기타문의" onClick={() => navigateTo('res_pay_service')} color="emerald" icon="credit-card" />
                                </div>
                            </Step>
                        )}

                        {activeStep === 'category' && (
                            <Step title="3단계: 일반 문의 분류" icon="message-square" description="고객이 원하는 핵심 내용이 무엇인가요?" onBack={goBack}>
                                <div className="grid grid-cols-1 gap-3">
                                    <ChoiceButton label="프로그램 오류" onClick={() => navigateTo('res_error')} />
                                    <ChoiceButton label="장비 문제" onClick={() => navigateTo('res_hardware')} />
                                    <ChoiceButton label="설정 / 기능 문의" onClick={() => navigateTo('res_setting')} />
                                    <ChoiceButton label="결제 내역 확인" onClick={() => navigateTo('res_payment')} />
                                </div>
                            </Step>
                        )}

                        {activeStep === 'paik_category' && (
                            <Step title="빽다방 전용 대응" icon="coffee" color="amber" description="점주님이 요청하신 항목을 선택하세요." onBack={goBack}>
                                <div className="grid grid-cols-1 gap-3">
                                    <ChoiceButton label="1. 프로그램 오류" color="amber" onClick={() => navigateTo('res_paik_1')} />
                                    <ChoiceButton label="2. 장비 문제" color="amber" onClick={() => navigateTo('res_paik_2')} />
                                    <ChoiceButton label="3. 설정 / 기능" color="amber" onClick={() => navigateTo('res_paik_3')} />
                                    <ChoiceButton label="결제 내역 확인" color="amber" onClick={() => navigateTo('res_payment')} />
                                </div>
                            </Step>
                        )}

                        {activeStep === 'oq_category' && (
                            <Step title="오더퀸 전용 대응" icon="monitor" color="purple" description="점주님이 요청하신 항목을 선택하세요." onBack={goBack}>
                                <div className="grid grid-cols-1 gap-3">
                                    <ChoiceButton label="1. 프로그램 오류" color="purple" onClick={() => navigateTo('res_oq_1')} />
                                    <ChoiceButton label="2. 장비 문제" color="purple" onClick={() => navigateTo('res_oq_2')} />
                                    <ChoiceButton label="3. 설정 / 기능" color="purple" onClick={() => navigateTo('res_oq_3')} />
                                    <ChoiceButton label="결제 내역 확인" color="purple" onClick={() => navigateTo('res_payment')} />
                                </div>
                            </Step>
                        )}

                        {contents[activeStep] && (
                            <ResultCard 
                                stepKey={activeStep} 
                                data={contents[activeStep]} 
                                categories={categories}
                                newItem={newItem}
                                setNewItem={setNewItem}
                                addItem={addItem}
                                removeItem={removeItem}
                                updateItem={updateItem}
                                moveOrCopyItem={moveOrCopyItem}
                                onReset={() => { setHistory([]); setActiveStep('start'); }}
                                onBack={goBack}
                            />
                        )}
                    </div>

                    <footer className="mt-24 w-full border-t border-slate-200 pt-10">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4 text-slate-400 font-bold text-sm">
                                <Icon name="info" size={16} />
                                <span>작성/수정된 내용은 브라우저에 자동 저장됩니다.</span>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={exportToExcel} className="flex items-center gap-2 px-6 py-3 bg-emerald-600 text-white rounded-2xl font-black hover:bg-emerald-700 transition-all text-sm shadow-md active:scale-95">
                                    <Icon name="download" size={16} /> 엑셀 파일 다운로드
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
